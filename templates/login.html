<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <base href="{{ base_href }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Quote Management System</title>
    <link rel="stylesheet" href="static/style.css?v={{ static_version }}">
</head>
<body class="login-body">
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-brand">
                <div class="login-logo">
                    <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="40" height="40" rx="10" fill="rgba(255,255,255,0.15)"/>
                        <path d="M10 12h20M10 20h14M10 28h17" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                        <circle cx="30" cy="28" r="5" fill="white" fill-opacity="0.9"/>
                        <path d="M28 28l1.5 1.5L32 26" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h1 class="login-title">QUOTE MANAGEMENT<br>SYSTEM</h1>
            </div>

            {% if error %}
            <div class="login-error">{{ error }}</div>
            {% endif %}

            <form method="post" action="login" class="login-form">
                <div class="login-field">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" autocomplete="username"
                           autofocus placeholder="Enter username" required>
                </div>
                <div class="login-field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" autocomplete="current-password"
                           placeholder="Enter password" required>
                </div>
                <button type="submit" class="login-btn">Sign In</button>
            </form>
        </div>
    </div>
</body>
</html>
