<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Project - Admin</title>
    <link rel="stylesheet" href="{{ base_url }}/static/style.css">
    <script>const BASE_URL = "{{ base_url }}";</script>
</head>
<body>
    <div class="admin-form-page">
        <div class="admin-form-container">
            <div class="admin-form-header">
                <h1>Add New Project</h1>
                <a href="{{ base_url }}/admin" class="back-link">← Back to Admin</a>
            </div>

            <form id="projectForm" class="admin-form">
                <div class="form-group">
                    <label for="tenantSelect">Tenant <span class="required">*</span></label>
                    <select id="tenantSelect" name="tenant_id" required>
                        <option value="">Select tenant...</option>
                        {% for tenant in tenants %}
                        <option value="{{ tenant.id }}">{{ tenant.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <script>
                    // Pre-select tenant if passed in URL
                    const urlParams = new URLSearchParams(window.location.search);
                    const tenantId = urlParams.get('tenant_id');
                    if (tenantId) {
                        document.getElementById('tenantSelect').value = tenantId;
                    }
                </script>

                <div class="form-group">
                    <label for="projectName">Project Name <span class="required">*</span></label>
                    <input
                        type="text"
                        id="projectName"
                        name="project_name"
                        placeholder="Enter project name"
                        required
                        autofocus>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea
                        id="description"
                        name="description"
                        placeholder="Enter project description (optional)"
                        rows="3"
                        style="resize: vertical;"></textarea>
                </div>

                <div id="formStatus"></div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Save Project</button>
                    <a href="{{ base_url }}/admin" class="btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('projectForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(e.target);
            const statusDiv = document.getElementById('formStatus');

            const projectName = document.getElementById('projectName').value.trim();
            const tenantId = document.getElementById('tenantSelect').value;

            if (!projectName || !tenantId) {
                statusDiv.innerHTML = '<div class="error">Project name and tenant are required</div>';
                return;
            }

            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Saving...';

            statusDiv.innerHTML = '<div class="loading">Creating project...</div>';

            try {
                const response = await fetch(`${BASE_URL}/admin/projects/create`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    statusDiv.innerHTML = '<div class="success">Project created successfully!</div>';
                    setTimeout(() => {
                        window.location.href = `${BASE_URL}/admin`;
                    }, 1000);
                } else {
                    statusDiv.innerHTML = `<div class="error">Error: ${result.error}</div>`;
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Save Project';
                }
            } catch (error) {
                statusDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
                submitBtn.disabled = false;
                submitBtn.textContent = 'Save Project';
            }
        });
    </script>
</body>
</html>
