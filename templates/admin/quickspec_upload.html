<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Upload QuickSpec</title></head>
<body>

<div class="quickspec-upload-content">
    <h2 class="admin-section-title">Upload HPE QuickSpec PDF</h2>
    <p class="qs-intro">
        Upload an HPE QuickSpec PDF to parse all available component options
        for that server model. Parsed components are stored in the server catalog
        and linked to the server via a spec-to-component index.
    </p>

    <div class="qs-upload-card">
        <div class="qs-drop-area" id="qsDropArea">
            <div class="qs-drop-icon">&#128196;</div>
            <p class="qs-drop-label">Drag &amp; drop QuickSpec PDF here</p>
            <p class="qs-drop-sub">or</p>
            <label class="btn-qs-browse" for="qsFileInput">Choose PDF</label>
            <input type="file" id="qsFileInput" accept=".pdf" style="display:none">
            <p class="qs-file-name" id="qsFileName">No file selected</p>
        </div>

        <button class="btn-qs-upload" id="qsUploadBtn" disabled onclick="submitQuickSpec()">
            &#9654; Parse &amp; Save
        </button>
    </div>

    <div id="qsProgress" class="qs-progress" style="display:none">
        <div class="qs-progress-bar" id="qsProgressBar"></div>
        <span class="qs-progress-label" id="qsProgressLabel">Uploading…</span>
    </div>

    <div id="qsResult" class="qs-result" style="display:none"></div>
</div>

</body>
</html>
