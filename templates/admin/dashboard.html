<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Quote Management</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="admin-layout">
        <!-- Left Sidebar -->
        <aside class="admin-sidebar">
            <div class="admin-sidebar-header">
                <h2>Admin Panel</h2>
                <a href="/" class="back-link">← Back to Main</a>
            </div>

            <nav class="admin-menu">
                <div class="admin-menu-section">
                    <h3 class="admin-menu-header">Tenant Management</h3>
                    <ul class="admin-menu-list">
                        <li>
                            <a href="#" class="admin-menu-item active" data-view="tenants">
                                Tenant List
                            </a>
                        </li>
                        <li>
                            <a href="#" class="admin-menu-item" data-view="archived-tenants">
                                Archived Tenants
                            </a>
                        </li>
                    </ul>
                </div>
                <div class="admin-menu-section">
                    <h3 class="admin-menu-header">Project Management</h3>
                    <ul class="admin-menu-list">
                        <li>
                            <a href="#" class="admin-menu-item" data-view="projects">
                                Project List
                            </a>
                        </li>
                    </ul>
                </div>
                <div class="admin-menu-section">
                    <h3 class="admin-menu-header">Quotes</h3>
                    <ul class="admin-menu-list">
                        <li>
                            <a href="#" class="admin-menu-item" data-view="quotes">
                                Quote List
                            </a>
                        </li>
                    </ul>
                </div>
                <div class="admin-menu-section">
                    <h3 class="admin-menu-header">Components</h3>
                    <ul class="admin-menu-list">
                        <li>
                            <a href="#" class="admin-menu-item" data-view="components">
                                Learned Components
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>
        </aside>

        <!-- Right Content Area -->
        <main class="admin-content">
            <div id="contentArea">
                <div class="admin-welcome">
                    <h1>Welcome to Admin Dashboard</h1>
                    <p>Select an option from the menu to get started.</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Handle menu navigation
        document.querySelectorAll('.admin-menu-item').forEach(item => {
            item.addEventListener('click', async (e) => {
                e.preventDefault();

                // Update active state
                document.querySelectorAll('.admin-menu-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');

                // Get view type
                const view = item.dataset.view;

                // Load content based on view
                if (view === 'tenants') {
                    await loadTenantsView();
                } else if (view === 'archived-tenants') {
                    await loadArchivedTenantsView();
                } else if (view === 'projects') {
                    await loadProjectsView();
                } else if (view === 'components') {
                    await loadComponentsView();
                } else if (view === 'quotes') {
                    await loadQuotesView();
                }
            });
        });

        async function loadTenantsView() {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = '<div class="loading">Loading tenants...</div>';

            try {
                const response = await fetch(`/admin/tenants`);
                const html = await response.text();

                // Extract just the content we need
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const content = doc.querySelector('.tenants-content');

                if (content) {
                    contentArea.innerHTML = content.outerHTML;
                } else {
                    contentArea.innerHTML = html;
                }
            } catch (error) {
                contentArea.innerHTML = `<div class="error">Error loading tenants: ${error.message}</div>`;
            }
        }

        async function loadArchivedTenantsView() {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = '<div class="loading">Loading archived tenants...</div>';
            try {
                const response = await fetch(`/admin/tenants/archived`);
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const content = doc.querySelector('.archived-tenants-content');
                contentArea.innerHTML = content ? content.outerHTML : html;
            } catch (error) {
                contentArea.innerHTML = `<div class="error">Error loading archived tenants: ${error.message}</div>`;
            }
        }

        async function archiveTenant(id, name) {
            if (!confirm(`Archive "${name}"?\n\nThis will also archive all associated projects.`)) return;
            try {
                const response = await fetch(`/api/admin/tenants/${id}/archive`, { method: 'POST' });
                const result = await response.json();
                if (result.success) {
                    await loadTenantsView();
                } else {
                    alert(`Error: ${result.error}`);
                }
            } catch (error) {
                alert(`Error: ${error.message}`);
            }
        }

        async function loadProjectsView() {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = '<div class="loading">Loading projects...</div>';

            try {
                const response = await fetch(`/admin/projects`);
                const html = await response.text();

                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const content = doc.querySelector('.projects-content');

                if (content) {
                    contentArea.innerHTML = content.outerHTML;
                } else {
                    contentArea.innerHTML = html;
                }
            } catch (error) {
                contentArea.innerHTML = `<div class="error">Error loading projects: ${error.message}</div>`;
            }
        }

        async function loadTenantProjects(tenantId, tenantName) {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = '<div class="loading">Loading tenant projects...</div>';

            try {
                const response = await fetch(`/admin/tenants/${tenantId}/projects`);
                const html = await response.text();

                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const content = doc.querySelector('.tenant-projects-content');

                if (content) {
                    contentArea.innerHTML = content.outerHTML;
                } else {
                    contentArea.innerHTML = html;
                }
            } catch (error) {
                contentArea.innerHTML = `<div class="error">Error loading tenant projects: ${error.message}</div>`;
            }
        }

        async function loadComponentsView() {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = '<div class="loading">Loading components...</div>';
            try {
                const response = await fetch(`/admin/components`);
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const content = doc.querySelector('.components-content');
                contentArea.innerHTML = content ? content.outerHTML : html;
                initComponentFilters();
            } catch (error) {
                contentArea.innerHTML = `<div class="error">Error loading components: ${error.message}</div>`;
            }
        }

        async function loadQuotesView() {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = '<div class="loading">Loading quotes...</div>';
            try {
                const response = await fetch(`/admin/quotes`);
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const content = doc.querySelector('.quotes-admin-content');
                contentArea.innerHTML = content ? content.outerHTML : html;
                initQuotesSearch();
            } catch (error) {
                contentArea.innerHTML = `<div class="error">Error loading quotes: ${error.message}</div>`;
            }
        }

        function initQuotesSearch() {
            const input = document.getElementById('quotesSearch');
            const countEl = document.getElementById('quotesSearchCount');
            if (!input) return;

            const rows = Array.from(document.querySelectorAll('#quotesAdminTable tbody tr'));
            const total = rows.length;

            function updateCount(visible) {
                countEl.textContent = visible < total
                    ? `${visible} of ${total} quotes`
                    : `${total} quotes`;
            }
            updateCount(total);

            input.addEventListener('input', () => {
                const q = input.value.trim().toLowerCase();
                let visible = 0;
                rows.forEach(row => {
                    const match = !q || row.textContent.toLowerCase().includes(q);
                    row.style.display = match ? '' : 'none';
                    if (match) visible++;
                });
                updateCount(visible);
            });

            input.focus();
        }

        async function deleteQuote(id, quoteId) {
            if (!confirm(`Delete quote "${quoteId}"?\n\nThis will permanently remove the quote and all its line items.`)) return;
            try {
                const response = await fetch(`/api/admin/quotes/${id}/delete`, { method: 'POST' });
                const result = await response.json();
                if (result.success) {
                    await loadQuotesView();
                } else {
                    alert(`Error: ${result.error}`);
                }
            } catch (error) {
                alert(`Error: ${error.message}`);
            }
        }

        function initComponentFilters() {
            const select = document.getElementById('typeFilter');
            if (!select) return;
            select.addEventListener('change', () => {
                const type = select.value;
                document.querySelectorAll('#componentsTable tbody tr').forEach(row => {
                    row.style.display = (type === 'all' || row.dataset.type === type) ? '' : 'none';
                });
            });
        }

        async function loadProjectQuotes(projectId, projectName, tenantId, tenantName) {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = '<div class="loading">Loading project quotes...</div>';

            try {
                const response = await fetch(`/admin/projects/${projectId}/quotes`);
                const html = await response.text();

                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const content = doc.querySelector('.project-quotes-content');

                if (content) {
                    contentArea.innerHTML = content.outerHTML;
                } else {
                    contentArea.innerHTML = html;
                }
            } catch (error) {
                contentArea.innerHTML = `<div class="error">Error loading project quotes: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
